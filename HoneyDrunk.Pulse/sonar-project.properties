# SonarQube Cloud project configuration for HoneyDrunk.Pulse.
# Project imported via the SonarQube Cloud GitHub App; quality gate runs in
# job-sonarcloud.yml (HoneyDrunk.Actions) on every PR and push to main.
#
# This file lives at HoneyDrunk.Pulse/sonar-project.properties (inside the
# inner project subdir, next to HoneyDrunk.Pulse.slnx). All sonar.sources /
# sonar.tests paths are relative to this subdir, which matches the
# working-directory the reusable job-sonarcloud.yml runs from.

sonar.organization=honeydrunkstudios
sonar.projectKey=honeydrunkstudios_HoneyDrunk.Pulse
sonar.projectName=HoneyDrunk.Pulse

# Sources — Pulse + Telemetry packages + Collector host. Samples excluded.
sonar.sources=HoneyDrunk.Pulse.Contracts,HoneyDrunk.Telemetry.Abstractions,HoneyDrunk.Telemetry.OpenTelemetry,HoneyDrunk.Telemetry.Sink.AzureMonitor,HoneyDrunk.Telemetry.Sink.Loki,HoneyDrunk.Telemetry.Sink.Mimir,HoneyDrunk.Telemetry.Sink.PostHog,HoneyDrunk.Telemetry.Sink.Sentry,HoneyDrunk.Telemetry.Sink.Shared,HoneyDrunk.Telemetry.Sink.Tempo,Pulse.Collector

# Tests
sonar.tests=Pulse.Tests

# Coverage (consumed by job-sonarcloud.yml after Cobertura → OpenCover conversion)
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml

# Exclusions — generated code, build outputs, and sample apps
sonar.exclusions=**/obj/**,**/bin/**,**/*.Designer.cs,**/HoneyDrunk.Pulse.Sample.Api/**,**/HoneyDrunk.Pulse.Sample.Worker/**

# Coverage exclusions — contracts/abstractions contain interfaces only
sonar.coverage.exclusions=**/HoneyDrunk.Pulse.Contracts/**,**/HoneyDrunk.Telemetry.Abstractions/**

# New Code definition — inherits from organization default (30 days)
